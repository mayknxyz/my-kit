name: Shellcheck

on:
  push:
    branches: [main]
    paths:
      - '**.sh'
      - '.mykit/scripts/**'
  pull_request:
    branches: [main]
    paths:
      - '**.sh'
      - '.mykit/scripts/**'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.mykit/scripts'
          severity: warning
